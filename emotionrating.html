<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  
  <body>
    <div id="navbar-container">
      <nav class="navbar">
        <div class="logo">Memo Learn</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="home.html#about_us">Who are we</a></li>
            <li><a href="home.html#contact">Contact</a></li>
        </ul>
        </nav>
    </div>
    <div class = "emotion-container">
        <h1 class = "emotion-title">How are you feeling about studying today?</h1>
        <div class = "mood-row">
            <div class = "mood grey" onclick = "selectEmotion('tired')">
                <img src = "assets/tiredface.png" alt = "Tired face">
            </div>
            <div class = "mood red" onclick = "selectEmotion('angry')">
                <img src = "assets/angryface.png" alt = "Angry face">
            </div>
            <div class = "mood orange-red" onclick = "selectEmotion('disgruntled')">
                <img src = "assets/disgruntledface.png" alt = "Disgruntled face">
            </div>
            <div class = "mood orange" onclick = "selectEmotion('okay')">
                <img src = "assets/okayface.png" alt = "Okay face">
            </div>
            <div class = "mood yellow" onclick = "selectEmotion('happy')">
                <img src = "assets/happyface.png" alt = "Happy face">
            </div>
        </div>
    </div>
    </body>
    <script>
        function selectEmotion(emotion) {
            localStorage.setItem("selectedEmotion", emotion);
            window.location.href = "home.html"
        }
    </script>
</html>
