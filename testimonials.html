    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <body>
    <div id="navbar-container">
      <nav class="navbar">
        <div class="logo">Memo Learn</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="home.html#about_us">Who are we</a></li>
            <li><a href="home.html#contact">Contact</a></li>
        </ul>
        </nav>
    </div>

    <div class = "testimonial-container">
        <h1>Inspiration</h1>
        <p id = "testimonial-text"></p>

        <div class = "testimonial-info">
            <h3 id = "testimonial-name"></h3>
            <p id = "testimonial-school"></p>
        </div>

        <div class = "controls">
            <button onclick = "prevTestimonials()">←</button>
            <button onclick = "nextTestimonials()">→</button>
        </div>

        <div id = "dots"></div>

    </div>

    <script>
        let currentIndex = 0;
        let currentTestimonial = [];
        window.onload = function () {
            const emotion = localStorage.getItem("selectedEmotion");
            currentTestimonial = testimonials[emotion] || testimonials.default;
            displayTestimonial();
        };

        function displayTestimonial() {
            const t = currentTestimonial[currentIndex];
            document.getElementById("testimonial-text").textContent = t.text;
            document.getElementById("testimonial-name").textContent = t.name;
            document.getElementById("testimonial-school").textContent = t.school;
        }

        function nextTestimonials () {
            currentIndex = (currentIndex + 1) % currentTestimonial.length;
            displayTestimonial();
        }

        function prevTestimonials () {
            currentIndex = (currentIndex - 1 + currentTestimonial.length) % currentTestimonial.length;
            displayTestimonial();
        }
    </script>

                    school: "Brown '26",

            ],
            tired: [

    </script>
