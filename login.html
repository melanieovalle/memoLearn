<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>MemoLearn</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="navbar-container">
      <nav class="navbar">
        <div class="logo">Memo Learn</div>
        <ul class="nav-links">
          <li><a href="home.html">Home</a></li>
          <li><a href="home.html#about_us">Who are we</a></li>
          <li><a href="home.html#contact">Contact</a></li>
        </ul>
      </nav>
    </div>
    
    <main class="login">
      <h1>Welcome back to <span class="italic-text">MemoLearn</span></h1>

      <div class="form-group">
        <input type="email" id="email" placeholder="E-Mail Address" autocomplete="email">
        <span class="error-msg" id="emailError"> Enter a valid email address.</span>

        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <span class="error-msg" id="passwordError"> Your password needs to be at least 6 characters.</span>

        <button class="start-btn-login" onclick="handleLogin()">Login</button>

        <p class="signup-link"> Don't have an account? <a href="signup.html">Sign up</a></p>
      </div>
    </main>

    <script src="scripts.js"></script>
  </body>
</html>
